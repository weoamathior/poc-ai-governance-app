  #       run: |
  #         # Recompute or retrieve the findings for the merged PR, then:
  #         #   cp findings.json "audit-log/${PR_NUMBER}-${COMMIT_SHA}.json"
  #         # For auto-approved PRs, write the minimal rule-matched record instead.
  #         git config user.name  "governance-pipeline"
  #         git config user.email "governance-pipeline@users.noreply.github.com"
  #         git add audit-log/
  #         git commit -m "audit: record findings for PR #${PR_NUMBER} (${COMMIT_SHA})"
  #         git push
