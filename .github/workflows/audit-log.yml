# =============================================================================
# audit-log.yml
#
# At merge time, write the durable governance audit record for the PR to
# audit-log/{prNumber}-{mergeSha}.json and commit it to the default branch.
#
# Triggers on `pull_request: [closed]` (gated to merged PRs) rather than on a push
# to the default branch. That matters: a push trigger would re-fire on the audit
# commit itself, looping. A pull_request[closed] event is not re-fired by the audit
# commit, and it hands us the PR number and merge SHA directly — no commit→PR
# reverse lookup needed.
#
# The record's findings are read from the PR's sticky governance comment, so they
# reflect the final post-dismissal state (what was open, what was dismissed and by
# whom) at merge.
# =============================================================================

name: Audit Log

on:
  pull_request:
    types: [closed]

permissions:
  contents: write   # commit the audit record to the default branch

jobs:
  record:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0   # full history so we can switch to / create the ledger branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build audit record from the sticky comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 .github/scripts/audit_record.py \
            --pr "${{ github.event.pull_request.number }}" \
            --merge-sha "${{ github.event.pull_request.merge_commit_sha }}" \
            --merged-at "${{ github.event.pull_request.merged_at }}"

      - name: Commit the record to the audit-ledger branch
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          SHA="${{ github.event.pull_request.merge_commit_sha }}"
          RECORD="audit-log/${PR}-${SHA}.json"
          [ -f "$RECORD" ] || { echo "No record produced."; exit 0; }
          cp "$RECORD" /tmp/record.json

          git config user.name  "governance-pipeline"
          git config user.email "governance-pipeline@users.noreply.github.com"

          # The audit ledger lives on its own branch, NOT the default branch. The
          # default branch is protected by the required governance/gate check, which
          # rejects any direct push (including this automated one). The ledger branch
          # is unprotected, append-only, and conceptually separate from code anyway.
          LEDGER="governance-audit"
          if git ls-remote --exit-code --heads origin "$LEDGER" >/dev/null 2>&1; then
            git fetch origin "$LEDGER"
            git checkout -f "$LEDGER"
          else
            git checkout --orphan "$LEDGER"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p audit-log
          cp /tmp/record.json "$RECORD"
          git add "$RECORD"
          if git diff --cached --quiet; then echo "Record already present."; exit 0; fi
          git commit -m "audit: PR #${PR} (${SHA})"
          git push origin "$LEDGER"
